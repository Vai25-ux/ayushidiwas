<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Ayushi Diwas ✨</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>

<body>

<section class="hero">

    <div class="overlay"></div>

    <div class="content">

        <h1>✨ AYUSHI DIWAS ✨</h1>

        <p class="tagline">
            Not just a birthday...<br>
            It's a celebration of someone truly special.
        </p>

        <div class="details">

            <div class="card">
                <h3>📅 Celebration</h3>
                <p>8 July Evening</p>
            </div>

            <div class="card">
                <h3>🎂 Birthday</h3>
                <p>9 July</p>

            <div class="card">
                <h3>📍 Venue</h3>
                <p>Trippy Tequila<br>Garden Galleria<br>Noida</p>
            </div>

            <div class="card">
                <h3>🕘 Time</h3>
                <p>9:00 PM Onwards</p>
            </div>

        </div>

        <a class="button" href="#">
            Count Me In ❤️
        </a>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
